<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Recommendations - Moshoeshoe E-shopping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-id {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 14px;
            color: #666;
        }

        .back-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 18px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .score-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .product-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px 16px 0 0;
            margin-bottom: 0;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover .product-image img {
            transform: scale(1.08);
        }

        .product-category {
            font-size: 0.75rem;
            color: #667eea;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #212529;
            min-height: 2.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .product-brand {
            font-size: 0.875rem;
            color: #6c757d;
            margin-bottom: 0.75rem;
        }

        .product-price {
            font-size: 1.75rem;
            font-weight: 800;
            color: #212529;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }

        .product-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 1rem;
            padding: 0 1.5rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .reason {
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: #495057;
            margin: 0 1.5rem 1.5rem 1.5rem;
            line-height: 1.5;
        }

        .no-recommendations {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-recommendations-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-recommendations h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #333;
        }

        .no-recommendations p {
            font-size: 16px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .type-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .icon {
            display: inline-block;
            font-size: 24px;
        }

        .hidden {
            display: none;
        }

        /* SVG Icon Styles */
        .icon-sm {
            width: 14px;
            height: 14px;
            vertical-align: middle;
            margin-right: 4px;
        }

        .icon-md {
            width: 16px;
            height: 16px;
            vertical-align: middle;
            margin-right: 6px;
        }

        .icon-lg {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            margin-right: 8px;
        }

        svg {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>
                Moshoeshoe E-shopping
            </div>
            <div class="user-info">
                <div class="user-id" id="userIdDisplay">Loading...</div>
                <a href="demo.html" class="back-btn">← Back to Shop</a>
            </div>
        </header>

        <!-- Personalized Recommendations Section -->
        <div class="section" id="personalizedSection">
            <div class="section-title">
                <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                Recommended For You
            </div>
            <div class="section-subtitle">Based on your browsing history and preferences</div>
            <div id="personalizedContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Finding perfect recommendations for you...</p>
                </div>
            </div>
        </div>

        <!-- Complementary Products Section -->
        <div class="section hidden" id="complementarySection">
            <div class="section-title">
                <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Frequently Bought Together
            </div>
            <div class="section-subtitle">Customers who bought this also bought</div>
            <div id="complementaryContent"></div>
        </div>
    </div>

    <script>
        // Get user ID from localStorage or generate new one
        let userId = localStorage.getItem('moshoeshoe_user_id');
        if (!userId) {
            userId = 'user-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('moshoeshoe_user_id', userId);
        }
        document.getElementById('userIdDisplay').textContent = `User: ${userId}`;

        const API_BASE = 'http://localhost:8001';

        // Product catalog — names, brands, and images match demo.html exactly
        const productsCatalog = {
            'prod-001': { name: 'Gaming Laptop Pro X1',    brand: 'TechPro',      image: 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=400&h=300&fit=crop' },
            'prod-002': { name: 'RGB Mechanical Keyboard', brand: 'KeyMaster',    image: 'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&h=300&fit=crop' },
            'prod-003': { name: 'Pro Gaming Mouse X1',     brand: 'MouseTech',    image: 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400&h=300&fit=crop' },
            'prod-004': { name: 'Wireless Gaming Headset', brand: 'SoundPro',     image: 'https://images.unsplash.com/photo-1484704849700-f032a568e944?w=400&h=300&fit=crop' },
            'prod-005': { name: 'USB-C Hub Pro',           brand: 'ConnectPlus',  image: 'https://images.unsplash.com/photo-1625948515291-69613efd103f?w=400&h=300&fit=crop' },
            'prod-006': { name: 'Ergonomic Gaming Chair',  brand: 'ComfortZone',  image: 'https://images.unsplash.com/photo-1580480055273-228ff5388ef8?w=400&h=300&fit=crop' },
            'prod-007': { name: 'Ultrawide 34" Monitor',   brand: 'ViewMax',      image: 'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400&h=300&fit=crop' },
            'prod-008': { name: 'Aluminum Laptop Stand',   brand: 'ErgoDesk',     image: 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400&h=300&fit=crop' },
            'prod-009': { name: 'Graphics Drawing Tablet', brand: 'DrawPro',      image: 'https://images.unsplash.com/photo-1612198188060-c7c2a3b66eae?w=400&h=300&fit=crop' },
            'prod-010': { name: '4K Webcam Pro',           brand: 'StreamCam',    image: 'https://images.unsplash.com/photo-1617802690992-15d93263d3a9?w=400&h=300&fit=crop' },
            'prod-011': { name: 'Business Ultrabook',      brand: 'WorkStation',  image: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&h=300&fit=crop' },
            'prod-012': { name: 'Portable SSD 1TB',        brand: 'DataFast',     image: 'https://images.unsplash.com/photo-1597872200969-2b65d56bd16b?w=400&h=300&fit=crop' },
            'prod-013': { name: 'Wireless Mouse Pad RGB',  brand: 'MouseTech',    image: 'https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=400&h=300&fit=crop' },
            'prod-014': { name: 'Studio Monitor Speakers', brand: 'SoundPro',     image: 'https://images.unsplash.com/photo-1545454675-3531b543be5d?w=400&h=300&fit=crop' },
            'prod-015': { name: 'Mechanical Numpad',       brand: 'KeyMaster',    image: 'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&h=300&fit=crop' },
            'prod-016': { name: 'Gaming Desk XL',          brand: 'ErgoDesk',     image: 'https://images.unsplash.com/photo-1593062096033-9a26b09da705?w=400&h=300&fit=crop' },
            'prod-017': { name: 'VR Headset Pro',          brand: 'ViewMax',      image: 'https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?w=400&h=300&fit=crop' },
            'prod-018': { name: 'Smart LED Light Strip',   brand: 'LightUp',      image: 'https://images.unsplash.com/photo-1556228852-80a9e2a75a0e?w=400&h=300&fit=crop' },
            'prod-019': { name: 'Capture Card 4K',         brand: 'StreamCam',    image: 'https://images.unsplash.com/photo-1550009158-9ebf69173e03?w=400&h=300&fit=crop' },
            'prod-020': { name: 'Premium Laptop Backpack', brand: 'TravelPro',    image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=300&fit=crop' },
            'prod-021': { name: 'Thunderbolt Dock',        brand: 'ConnectPlus',  image: 'https://images.unsplash.com/photo-1625948515291-69613efd103f?w=400&h=300&fit=crop' },
            'prod-022': { name: 'Studio Microphone',       brand: 'SoundPro',     image: 'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?w=400&h=300&fit=crop' },
            'prod-023': { name: 'Cable Management Kit',    brand: 'ErgoDesk',     image: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=300&fit=crop' },
            'prod-024': { name: 'Portable Monitor 15.6"',  brand: 'ViewMax',      image: 'https://images.unsplash.com/photo-1585792180666-f7347c490ee2?w=400&h=300&fit=crop' },
            'prod-025': { name: 'iPhone 15 Pro Max',       brand: 'AppleCore',    image: 'https://images.unsplash.com/photo-1511707267537-b85faf00021e?w=400&h=300&fit=crop' },
            'prod-026': { name: 'Samsung Galaxy S24',      brand: 'Samsung',      image: 'https://images.unsplash.com/photo-1511707267537-b85faf00021e?w=400&h=300&fit=crop' },
            'prod-027': { name: 'iPad Pro 12.9"',          brand: 'AppleCore',    image: 'https://images.unsplash.com/photo-1432085221519-86d2416b7d58?w=400&h=300&fit=crop' },
            'prod-028': { name: 'Samsung Galaxy Tab S9',   brand: 'Samsung',      image: 'https://images.unsplash.com/photo-1432085221519-86d2416b7d58?w=400&h=300&fit=crop' },
            'prod-029': { name: 'UltraHD 4K Monitor',      brand: 'ViewMax',      image: 'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400&h=300&fit=crop' },
            'prod-030': { name: 'Curved Gaming Monitor',   brand: 'ViewMax',      image: 'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400&h=300&fit=crop' },
            'prod-031': { name: 'Wireless Router WiFi 7',  brand: 'NetConnect',   image: 'https://images.unsplash.com/photo-1606904825846-647eb07f5be2?w=400&h=300&fit=crop' },
            'prod-032': { name: 'USB-C Hub 15 Ports',      brand: 'ConnectPlus',  image: 'https://images.unsplash.com/photo-1625948515291-69613efd103f?w=400&h=300&fit=crop' },
            'prod-033': { name: 'NAS Storage 12TB',        brand: 'DataFast',     image: 'https://images.unsplash.com/photo-1597872200969-2b65d56bd16b?w=400&h=300&fit=crop' },
            'prod-034': { name: 'SSD External 4TB',        brand: 'DataFast',     image: 'https://images.unsplash.com/photo-1597872200969-2b65d56bd16b?w=400&h=300&fit=crop' },
        };

        // Format price
        function formatPrice(price) {
            if (!price) return 'Price unavailable';
            return `R${parseFloat(price).toLocaleString()}`;
        }

        // Create product card HTML
        function createProductCard(product) {
            const catalogProduct = productsCatalog[product.product_id] || {};
            const productName = catalogProduct.name || product.product_name || product.product_id;
            const categoryImage = catalogProduct.image || 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=300&fit=crop';
            const score = product.score ? (product.score * 100).toFixed(0) : '0';
            
            return `
                <div class="product-card" onclick="viewProduct('${product.product_id}')">
                    ${product.score ? `<div class="score-badge">${score}% Match</div>` : ''}
                    <div class="product-image">
                        <img src="${categoryImage}" alt="${productName}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px 8px 0 0;">
                    </div>
                    <div style="padding: 1.5rem;">
                        <div class="product-category">${product.category ? product.category.toUpperCase() : 'UNCATEGORIZED'}</div>
                        <div class="product-name">${productName}</div>
                        <div class="product-brand">${catalogProduct.brand || product.brand || 'Various Brands'}</div>
                        <div class="product-price">${formatPrice(product.price)}</div>
                    </div>
                    <div class="product-stats">
                        <div class="stat">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <span>${product.views || 0} views</span>
                        </div>
                        <div class="stat">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="9" cy="21" r="1"/>
                                <circle cx="20" cy="21" r="1"/>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                            </svg>
                            <span>${product.purchases || 0} sold</span>
                        </div>
                    </div>
                    ${product.reason ? `<div class="reason">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4"/>
                            <path d="M12 8h.01"/>
                        </svg>
                        ${product.reason}
                    </div>` : ''}
                    ${product.co_viewers ? `<div class="reason">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        ${product.co_viewers} customers also viewed this
                    </div>` : ''}
                </div>
            `;
        }

        // Load personalized recommendations
        async function loadPersonalizedRecommendations() {
            try {
                const response = await fetch(`${API_BASE}/api/recommendations/${userId}?limit=12`, {
                    headers: { 'X-API-Key': 'demo-api-key' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const content = document.getElementById('personalizedContent');
                
                if (!data.recommendations || data.recommendations.length === 0) {
                    content.innerHTML = `
                        <div class="no-recommendations">
                            <div class="no-recommendations-icon">
                                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path d="m21 21-4.35-4.35"/>
                                </svg>
                            </div>
                            <h3>No recommendations yet</h3>
                            <p>Start browsing products to get personalized recommendations!</p>
                        </div>
                    `;
                    return;
                }
                
                const typeBadge = data.type === 'cold_start' 
                    ? '<span class="type-badge">Popular Products</span>'
                    : '<span class="type-badge">✨ Personalized for You</span>';
                
                const productsHtml = data.recommendations.map(createProductCard).join('');
                
                content.innerHTML = `
                    ${typeBadge}
                    <div class="products-grid">
                        ${productsHtml}
                    </div>
                `;
                
                console.log('[SUCCESS] Loaded recommendations:', data);
                
            } catch (error) {
                console.error('[ERROR] Failed to load recommendations:', error);
                document.getElementById('personalizedContent').innerHTML = `
                    <div class="error">
                        <strong>Error loading recommendations</strong><br>
                        ${error.message}<br>
                        <small>Make sure the Event Collector service is running on port 8001</small>
                    </div>
                `;
            }
        }

        // Load complementary products for a specific product
        async function loadComplementaryProducts(productId) {
            const section = document.getElementById('complementarySection');
            const content = document.getElementById('complementaryContent');
            
            section.style.display = 'block';
            content.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Finding complementary products...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`${API_BASE}/api/recommendations/complementary/${productId}?limit=6`, {
                    headers: { 'X-API-Key': 'demo-api-key' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data.complementary_products || data.complementary_products.length === 0) {
                    content.innerHTML = `
                        <div class="no-recommendations">
                            <div class="no-recommendations-icon">
                                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                                </svg>
                            </div>
                            <h3>No complementary products found</h3>
                            <p>Check back later for more recommendations!</p>
                        </div>
                    `;
                    return;
                }
                
                const productsHtml = data.complementary_products.map(createProductCard).join('');
                
                content.innerHTML = `
                    <div class="products-grid">
                        ${productsHtml}
                    </div>
                `;
                
                console.log('[SUCCESS] Loaded complementary products:', data);
                
            } catch (error) {
                console.error('[ERROR] Failed to load complementary products:', error);
                content.innerHTML = `
                    <div class="error">
                        <strong>Error loading complementary products</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        // Handle product click
        function viewProduct(productId) {
            console.log('[VIEW] Viewing product:', productId);
            // In a real app, this would navigate to product detail page
            // For now, we'll load complementary products
            loadComplementaryProducts(productId);
            
            // Scroll to complementary section
            document.getElementById('complementarySection').scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }

        // Load recommendations on page load
        window.addEventListener('load', () => {
            console.log('[LOAD] Recommendations page loaded for user:', userId);
            loadPersonalizedRecommendations();
            
            // Check if there's a product ID in URL (for complementary products)
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('product');
            if (productId) {
                loadComplementaryProducts(productId);
            }
        });

        // Auto-refresh recommendations every 2 minutes
        setInterval(() => {
            console.log('[REFRESH] Refreshing recommendations...');
            loadPersonalizedRecommendations();
        }, 120000);
    </script>
</body>
</html>
